# vim:ts=2:sw=2:et
os: linux

# Partner Queue Solution, no credits are consumed
arch: ppc64le

language: php

addons:
  postgresql: "9.6"

jobs:
  include:
    - php: 5.6
      dist: xenial
    - php: 7.0
      dist: xenial
    - php: 7.1
      dist: xenial
    - php: 7.2
      dist: xenial
    - php: 7.3
      dist: xenial
    - php: 7.4
      dist: focal
      addons:
        postgresql: "12"
    - php: 8.0
      dist: focal
      addons:
        postgresql: "12"
    - php: 8.1
      dist: focal
      addons:
        postgresql: "12"
    - name: "PHP: 8.2"
      dist: jammy
      language: ruby
      addons:
        postgresql: "14"
      before_install:
        - sudo apt install software-properties-common
        - sudo add-apt-repository ppa:ondrej/php
        - sudo apt update
        - sudo apt install php8.2 php8.2-mbstring php8.2-pgsql
        - php -v
        - sudo apt install libonig5
    - name: "PHP: 8.3"
      dist: jammy
      language: ruby
      addons:
        postgresql: "14"
      before_install:
        - sudo apt install software-properties-common
        - sudo add-apt-repository ppa:ondrej/php
        - sudo apt update
        - sudo apt install php8.3 php8.3-mbstring php8.3-pgsql
        - php -v
        - sudo apt install libonig5
    - name: "PHP: 8.4"
      dist: jammy
      language: ruby
      addons:
        postgresql: "14"
      before_install:
        - sudo apt install software-properties-common
        - sudo add-apt-repository ppa:ondrej/php
        - sudo apt update
        - sudo apt install php8.4 php8.4-mbstring php8.4-pgsql
        - php -v
        - sudo apt install libonig5
    - name: "PHP: 8.5"
      dist: jammy
      language: ruby
      addons:
        postgresql: "14"
      before_install:
        - sudo apt install software-properties-common
        - sudo add-apt-repository ppa:ondrej/php
        - sudo apt update
        - sudo apt install php8.5 php8.5-mbstring php8.5-pgsql
        - php -v
        - sudo apt install libonig5

before_script:
  - composer update --dev 2>&1
  - sudo -u postgres psql -c "CREATE DATABASE test;" -U postgres 2>&1
  - sudo -u postgres psql -c "CREATE USER test WITH ENCRYPTED PASSWORD 'test'" -U postgres 2>&1
  - sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE test TO test" -U postgres 2>&1

script:
  - cd test && ../vendor/bin/run_unit_tests
